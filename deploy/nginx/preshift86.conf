# deploy/nginx/preshift86.conf
#
# Nginx site configuration for PreShift (preshift86.com).
#
# Routes:
#   /api/*, /broadcasting/*, /sanctum/*, /up  → PHP-FPM (Laravel API)
#   /app/*                                    → Reverb WebSocket (port 6001)
#   /*                                        → Vue SPA static files (client/dist)
#
# SSL is managed by Certbot. Run:
#   certbot --nginx -d preshift86.com -d www.preshift86.com

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name preshift86.com www.preshift86.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server block ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name preshift86.com www.preshift86.com;

    # SSL certificates (populated by Certbot)
    ssl_certificate /etc/letsencrypt/live/preshift86.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/preshift86.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Laravel API (PHP-FPM) ────────────────────────────────────────
    # Handles /api, /broadcasting, /sanctum, and /up (health check)

    set $laravel_root /var/www/preshift/api/public;

    location /api {
        alias $laravel_root;
        try_files $uri $uri/ @php;
    }

    location /broadcasting {
        try_files /dev/null @php;
    }

    location /sanctum {
        try_files /dev/null @php;
    }

    location /up {
        try_files /dev/null @php;
    }

    # Named location for PHP-FPM passthrough
    location @php {
        root $laravel_root;
        fastcgi_pass unix:/run/php/php8.3-fpm-preshift.sock;
        fastcgi_param SCRIPT_FILENAME $laravel_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT $laravel_root;
    }

    # ── Reverb WebSocket proxy ───────────────────────────────────────
    # Proxies wss:// connections from the browser to Reverb on port 6001
    location /app {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Vue SPA static files ─────────────────────────────────────────
    # Serves the built frontend and falls back to index.html for client-side routing
    root /var/www/preshift/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/preshift/nginx-access.log;
    error_log /var/log/preshift/nginx-error.log;

    # ── File upload limit ────────────────────────────────────────────
    client_max_body_size 10M;
}
